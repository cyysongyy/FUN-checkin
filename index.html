      color: #fff;

      padding: 24px 16px;
    }
    #stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {

      background-clip: text;
      color: transparent;
      letter-spacing: 1px;
    }
    header p { color: var(--gray); font-size: .95rem; margin-top: 6px; }

      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 20px;
      backdrop-filter: blur(12px);
      padding: 24px;
      margin-bottom: 16px;
      animation: fadeUp .5s ease both;

      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 16px 24px; border: none; border-radius: 14px;
      font-size: 1.1rem; font-weight: 700; font-family: inherit;

    .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(26,138,138,.45); }

      background: linear-gradient(135deg, rgba(94,200,200,.15), rgba(241,196,15,.10));
      border: 1px solid rgba(94,200,200,.35);

      font-size: .75rem; font-weight: 700; margin-bottom: 12px;

    const $ = (s, root=document) => root.querySelector(s);
    const $$ = (s, root=document) => Array.from(root.querySelectorAll(s));

    // 星空背景
    (function makeStars(){
      const box = $('#stars');
      const n = 60;
      for (let i = 0; i < n; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const size = Math.random() * 2.5 + 0.5;
        s.style.width = s.style.height = size + 'px';
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 100 + '%';
        s.style.setProperty('--d', (2 + Math.random() * 4) + 's');
        s.style.animationDelay = (Math.random() * 4) + 's';
        box.appendChild(s);
      }
    })();

    let currentCat = '*';
    let lastIndex = -1;
    let seenCount = 0;

    function poolForCat(cat) {
      if (cat === '*') return QUESTIONS.map((q, i) => i);
      return QUESTIONS.map((q, i) => i)
        .filter(i => (QUESTIONS[i].category || '').startsWith(cat + '.'));
    }

    function updatePoolCount() {
      $('#poolCount').textContent = poolForCat(currentCat).length;
    }

    // 分類切換
    $$('#cats .cat').forEach(el => {
      el.addEventListener('click', () => {
        $$('#cats .cat').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        currentCat = el.dataset.cat;
        updatePoolCount();
      });
    });

    function drawQuestion() {
      const pool = poolForCat(currentCat);
      if (!pool.length) return;
      // 避免連抽兩題相同
      let idx;
      let tries = 0;
      do {
        idx = pool[Math.floor(Math.random() * pool.length)];
        tries++;
      } while (idx === lastIndex && pool.length > 1 && tries < 8);
      lastIndex = idx;
      seenCount++;
      $('#seenCount').textContent = seenCount;
      renderQuestion(QUESTIONS[idx]);
    }

    function renderQuestion(q) {
      const box = $('#questionBox');
      box.classList.remove('empty');
      box.innerHTML = `
        <div class="tag">${escapeHtml(q.category || '')}</div>
        <div class="zh">${escapeHtml(q.zh || '')}</div>
        <div class="en">${escapeHtml(q.en || '')}</div>
      `;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"\']/g, c => ({
        '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
      }[c]));
    }

    $('#drawBtn').addEventListener('click', drawQuestion);

    // 鍵盤快捷鍵：Enter 或 Space 抽題
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        drawQuestion();
      }
    });

    updatePoolCount();
  </script>
